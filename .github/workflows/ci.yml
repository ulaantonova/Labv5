name: CI/CD Pipeline

# Пайплайн запускається при кожному пуші або пул-реквесті в гілку main (або master)
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Клонуємо репозиторій на віртуальну машину GitHub
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Налаштовуємо Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-node-version: '3.10'

    # 3. Встановлюємо залежності
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. Лінтинг (перевірка синтаксису) та запуск тестів
    - name: Run Linters and Tests
      run: |
        # Перевірка синтаксису за допомогою flake8 (якщо встановлено)
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Запуск тестів за допомогою pytest (якщо є тести)
        if [ -f -d tests ] || ls test_*.py 1> /dev/null 2>&1; then pip install pytest && pytest; fi

    # 5. Автоматична збірка Docker-образу
    - name: Build Docker Image
      run: |
        docker build -t api-service:latest .g